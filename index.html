<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Trang web đặc biệt</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="overlay"></div>
    <div id="wrapper" class="wrapper">
      <div class="lid one"></div>
      <div class="lid two"></div>
      <div class="envelope"></div>
      <div id="letter" class="letter">
        <h2 id="l-header">Thư Tỏ Tình❤️</h2>
        <div class="message">
          <p id="l-content">
            Tôi đã thích bạn từ rất lâu, trái tim tôi đã lỡ trao cho bạn mất
            rồi.\nBạn có thể nhận không?
          </p>
          <div style="margin-top: 10px">
            <button id="l-btnA" onclick="showResponse('accept')">
              Chấp nhận
            </button>
            <button id="l-btnR" onclick="showResponse('refuse')">
              Từ chối
            </button>
          </div>
        </div>
      </div>
      <p class="from">—FROM—<br />TRAN VAN THUONG</p>
      <div class="heart">
        <img alt="heart" src="./heart.png" />
      </div>
      <div class="rose">
        <img alt="rose" src="./flower.png" />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
