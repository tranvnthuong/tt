<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Trang web đặc biệt</title>
    <style>
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background-image: url("https://i.imgur.com/mJMne0N.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;   
        }

        .wrapper {
            height: 200px;
            width: 300px;
            background-color: #ffff77;
            position: relative;
            display: flex;
            justify-content: center;
            z-index: 0;
        }

        .lid {
            position: absolute;
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            border-right: 150px solid transparent;
            border-bottom: 100px solid transparent;
            border-left: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.25s linear;
        }

        .heart, .rose, .lid {
            pointer-events: none;
        }

        /* Lid when closed */
        .lid.one {
            border-top: 100px solid #ffff9f;
            transform: rotateX(0deg);
            z-index: 3;
            transition-delay: 0.75s;
        }

        /* Lid when opened */
        .lid.two {
            border-top: 100px solid #ffff77;
            transform: rotateX(90deg);
            z-index: 1;
            transition-delay: 0.5s;
        }

        .envelope {
            position: absolute;
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid #ffd4c3;
            border-bottom: 100px solid #ffd4c3;
            border-left: 150px solid #ffc5af;
            z-index: 3;
        }

        .letter {
            position: absolute;
            top: 0;
            width: 80%;
            height: 80%;
            background-color: #fdfdfd;
            background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px); /* Tạo đường kẻ ngang */
            background-size: 100% 24px;
            padding: 25px;
            font-family: "Dancing Script", cursive;
            line-height: 1.5;
            border-radius: 5px;
            overflow: hidden;
            z-index: 2;
            transition: 0.5s;
        }

        .letter p {
            text-align: center;
            font-size: 18px;
            margin-top: 30px;
            color: #3B4049;
        }

        .message button {
            font-family: "Dancing Script", cursive;
            background-color: #fdfdfd;
            border: none;
            outline: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.3);
            cursor: pointer;
            margin-right: 10px;
        }

        .message button:hover {
            font-weight: bolder;
        }

        .wrapper:hover .lid.one {
            transform: rotateX(90deg);
            transition-delay: 0.25s;
        }

        .wrapper:hover .lid.two {
            transform: rotateX(180deg);
            transition-delay: 0.5s;
        }

        .wrapper:hover .letter {
            transform: translateY(-50px);
            transition-delay: 0.75s;
        }

        .wrapper:hover .heart {
            top: 40%;
            left: 33%;
            transform: rotate(-50deg);
            transition-delay: 0s;
        }

        .wrapper .rose {
            position: absolute;
            width: 130px;
            height: 130px;
            top: 38%;
            right: 5%;
            transform: rotate(50deg);
            z-index: 3;
            pointer-events: none;
        }

        .wrapper .heart {
            position: absolute;
            width: 33px;
            height: 33px;
            top: 40%;
            left: 45%;
            z-index: 3;
            pointer-events: none;
            transition: 0.5s;
        }
        
        .wrapper .rose img, .wrapper .heart img {
            width: 100%;
            height: 100%;
        }

        .hearts {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            transform: rotate(45deg);
            opacity: 1;
            pointer-events: none;
            animation: fadeOut 1s ease forwards;
        }

        .hearts::before,
        .hearts::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            border-radius: 50%;
        }
        
        .hearts::before {
            top: -5px;
            left: 0;
        }
        
        .hearts::after {
            left: 5px;
            top: 0;
        }

        @keyframes fadeOut {
            0% {
            opacity: 1;
            transform: translate(0, 0) scale(1);
            }
            100% {
            opacity: 0;
            transform: translate(var(--x), var(--y)) scale(0.5);
            }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            font-size: 2rem;
            animation: bubbleAnimation 2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes bubbleAnimation {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="wrapper" class="wrapper">
        <div class="lid one"></div>
        <div class="lid two"></div>
        <div class="envelope"></div>
        <div id="letter" class="letter">
            <h2 id="l-header">Thư Tỏ Tình❤️</h2>
            <div class="message">
                <p id="l-content">Tôi đã thích bạn từ rất lâu, trái tim tôi đã lỡ trao cho bạn mất rồi.\nBạn có thể nhận không?</p>
                <div style="margin-top: 10px;">
                    <button id="l-btnA" onclick="showResponse('accept')">Chấp nhận</button>
                    <button id="l-btnR" onclick="showResponse('refuse')">Từ chối</button>
                </div>
            </div>
        </div>
        <div class="heart">
            <img alt="heart" src="https://i.imgur.com/DxZhRHL.png">
        </div>
        <div class="rose">
            <img alt="rose" src="https://i.imgur.com/2Eaz5oB.png">
        </div>
    </div>
<script>
    document.getElementById("wrapper").addEventListener('touchstart', function() {
        this.classList.add('hover');
    });

    var openLetter = true;
    document.getElementById("wrapper").addEventListener('mouseleave', () => {
        document.getElementById("letter").removeAttribute("style");
        openLetter = true;
    });

    var warn = true;
    var showBb = false;
    var accept = true;
    const storedData = JSON.parse(localStorage.getItem('thoiGianDongY❤️'));
    document.getElementById("letter").addEventListener('click', () => {
        const backupContent = document.getElementById("l-content").innerText;
        if (warn && !storedData) {
            warn = false;
            document.getElementById("l-content").innerText = "Lá thư này có thể có một chút \"sức nặng\" hoặc không!\nBạn muốn đọc tiếp chứ?";
            document.getElementById("l-btnA").innerText = "Đọc tiếp";
            document.getElementById("l-btnA").setAttribute("onclick", `showResponse("continue", "${backupContent}")`);
            document.getElementById("l-btnR").innerText = "Không đọc nữa";
            document.getElementById("l-btnR").setAttribute("onclick", "showResponse('stop')");
        } else if (warn && storedData) {
            document.getElementById("l-content").innerText = backupContent.replace('\\n', "\n");
            document.getElementById("l-btnA").innerText = "Đã đồng ý❤️";
            document.getElementById("l-btnA").setAttribute("onclick", "showResponse('agreed')");
            document.getElementById("l-btnR").style.display = "none";
        }
        if (showBb) {
            if (accept) {
                showBubble(Math.floor(Math.random() * 50) + 1, "❤️");
            } else {
                showBubble(Math.floor(Math.random() * 50) + 1, "💔");
            }
        }
        let letter = document.getElementById("letter"); 
        if (openLetter) {
            letter.style.transform = "translateY(-250px)";
            setTimeout(function() {
                letter.style.transform = "translateY(-50px)";
                openLetter = false;
                letter.style.height = "auto";
                letter.style.zIndex = "4";
                if (letter.offsetHeight > 340) {
                    letter.style.width = "120%";
                    letter.style.transform = "translateY(-120px)";
                    letter.style.border = "20px solid transparent";
                    letter.style.borderImage = "url(https://i.imgur.com/1N0qRsl.png) 30 round";
                }
            }, 1000)
        } else {
            letter.style.height = "auto";
            letter.style.zIndex = "4";
            if (letter.offsetHeight > 340) {
                letter.style.width = "120%";
                letter.style.transform = "translateY(-120px)";
                letter.style.border = "20px solid transparent";
                letter.style.borderImage = "url(https://i.imgur.com/1N0qRsl.png) 30 round";
            }
        }
    });

    function showResponse(action, content = "") {
        if (action == "continue") {
            document.getElementById("l-content").innerText = content;
            document.getElementById("l-btnA").innerText = "Chấp nhận";
            document.getElementById("l-btnA").setAttribute("onclick", "showResponse('accept')");
            document.getElementById("l-btnR").innerText = "Từ chối";
            document.getElementById("l-btnR").setAttribute("onclick", "showResponse('refuse')");
        } else if (action == "stop") {
            accept = false;
            showBb = true;
            showBubble(50, "💔");
            document.getElementById("l-header").innerText = "Thư Tỏ Tình🥲";
            document.getElementById("l-content").innerText = "Cảm ơn đã mở lá thư\nChúc bạn ngày mới vui vẻ💔";
            document.getElementById("l-btnA").innerText = "OK";
            document.getElementById("l-btnA").setAttribute("onclick", "location.reload()");
            document.getElementById("l-btnR").style.display = "none";
        } else if (action == "refuse") {
            accept = false;
            showBb = true;
            showBubble(50, "💔");
            document.getElementById("l-header").innerText = "Thư Tỏ Tình💔";
            document.getElementById("l-content").innerText = "Cảm ơn bạn đã dành thời gian ra để đọc\nChúc bạn gặp nhiều niềm vui trong cuộc sống💔";
            document.getElementById("l-btnA").innerText = "OK";
            document.getElementById("l-btnA").setAttribute("onclick", "location.reload()");
            document.getElementById("l-btnR").style.display = "none";
        } else if (action == "accept" || action == "agreed") {
            accept = true;
            showBb = true;
            showBubble(50, "❤️");
            var hour, weekday, day, month, year;
            const date = new Date();
            const options = { timeZone: 'Asia/Ho_Chi_Minh', hour12: false };
            if (storedData) {
                hour = storedData.hour;
                weekday = storedData.weekday;
                day = storedData.day;
                month = storedData.month;
                year = storedData.year;
            } else {
                hour = new Intl.DateTimeFormat('vi-VN', { ...options, hour: 'numeric', minute: 'numeric', second: 'numeric' }).format(date);
                weekday = new Intl.DateTimeFormat('vi-VN', { ...options, weekday: 'long' }).format(date);
                day = new Intl.DateTimeFormat('vi-VN', { ...options, day: 'numeric' }).format(date);
                month = new Intl.DateTimeFormat('vi-VN', { ...options, month: 'long' }).format(date);
                year = new Intl.DateTimeFormat('vi-VN', { ...options, year: 'numeric' }).format(date);
                let dateTimeData = {
                    hour,
                    weekday,
                    day,
                    month,
                    year
                };
                localStorage.setItem('thoiGianDongY❤️', JSON.stringify(dateTimeData));
            }
            const ther = [
                `Giữa giờ ${hour}, lòng sao bối rối,\n${weekday} về, nắng gọi mưa bay.\nNgày ${day}, ${month} mê say,\nNăm ${year} đến, lòng thành câu hát.\nBao nhiêu thời gian trôi qua thầm lặng,\nChỉ hôm nay, mọi thứ bỗng nên thơ.\nKhoảnh khắc đẹp như một giấc mơ,\nNgày này, giờ này, ta hẹn thề mãi mãi.`,
                `Giờ ${hour} đến nhẹ nhàng, khẽ khàng,\n${weekday} gọi lòng ta thênh thang.\nNgày ${day}, ${month} miên man,\nNăm ${year}, lời yêu vừa trọn vẹn.`,
                `Giữa giờ ${hour}, phút giây mong đợi\n${weekday} về như nắng gọi cơn mưa.\nNgày ${day}, ${month} đong đưa,\nNăm ${year} này mãi khắc vào lòng nhớ.`,
            ];
            const title = ["Phút Giây Bất Tận", "Thời Gian Đẹp Nhất", "Một Ngày Để Nhớ"];
            const randomTher = Math.floor(Math.random() * ther.length);
            document.getElementById("l-header").innerText = title[randomTher];
            document.getElementById("l-content").innerText = ther[randomTher];
            document.getElementById("l-btnA").style.display = "none";
            document.getElementById("l-btnR").style.display = "none";
        }
        
        const userAgent = navigator.userAgent;
        let osInfo = "Unknown OS";
        if (userAgent.includes("Windows NT")) {
            const start = userAgent.indexOf("Windows NT");
            const end = userAgent.indexOf(")", start);
            osInfo = userAgent.substring(start, end);
        } else if (userAgent.includes("Macintosh")) {
            const start = userAgent.indexOf("Macintosh");
            const end = userAgent.indexOf(")", start);
            osInfo = userAgent.substring(start, end);
        } else if (userAgent.includes("Linux")) {
            const start = userAgent.indexOf("Linux");
            const end = userAgent.indexOf(")", start);
            osInfo = userAgent.substring(start, end);
        } else if (userAgent.includes("Android")) {
            const start = userAgent.indexOf("Android");
            const end = userAgent.indexOf(";", start);
            osInfo = userAgent.substring(start, end);
        } else if (userAgent.includes("iPhone") || userAgent.includes("iPad")) {
            const start = userAgent.indexOf("CPU");
            const end = userAgent.indexOf(" like Mac OS X", start);
            osInfo = userAgent.substring(start, end + " like Mac OS X".length);
        }

        fetch("https://foggy-berry-slayer.glitch.me/log", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: action,
                timestamp: new Date().toLocaleString('vi-VN', {
                    timeZone: 'Asia/Ho_Chi_Minh',
                    hour12: false
                }),
                userAgent: osInfo
            })
        });
    }

    function createHeartBurst(x, y) {
        for (let i = 0; i < 10; i++) {
        const heart = document.createElement("div");
        heart.className = "hearts";

        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 50 + 20;
        const offsetX = Math.cos(angle) * distance;
        const offsetY = Math.sin(angle) * distance;

        heart.style.setProperty("--x", `${offsetX}px`);
        heart.style.setProperty("--y", `${offsetY}px`);

        document.body.appendChild(heart);

        heart.addEventListener("animationend", () => {
            heart.remove();
        });
        }
    }

    document.addEventListener("click", (e) => {
        createHeartBurst(e.pageX, e.pageY);
    });

    function showBubble(amount, icon) {
        let overlay = document.querySelector('.overlay');
        let numHearts = amount;
        for (let i = 0; i < numHearts; i++) {
            let bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.innerHTML = icon;
            let x = Math.random() * 100;
            let y = Math.random() * 100;
            bubble.style.left = `${x}%`;
            bubble.style.top = `${y}%`;
            overlay.appendChild(bubble);
            setTimeout(() => {
                bubble.remove();
            }, 2000);
        }
    }
</script>

</body>
</html>
